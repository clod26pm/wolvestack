name: Auto-Translate New Content

on:
  push:
    branches: [main]
    paths:
      - '*.html'       # Only trigger when English HTML files change
      - '!en/**'        # Ignore changes in language directories
      - '!es/**'
      - '!zh/**'
      - '!ja/**'
      - '!pt/**'
      - '!ru/**'
      - '!it/**'
      - '!pl/**'
      - '!fr/**'
      - '!id/**'
      - '!de/**'
      - '!nl/**'
      - '!ar/**'

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Argos language packs
        uses: actions/cache@v4
        with:
          path: ~/.local/share/argos-translate
          key: argos-langs-v1

      - name: Install dependencies
        run: |
          pip install argostranslate beautifulsoup4

      - name: Install language packs
        run: python translate_site.py --install-languages

      - name: Find changed HTML files
        id: changed
        run: |
          # Get list of changed/added HTML files (root level only, not in lang dirs)
          CHANGED=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- '*.html' \
            | grep -v '^en/' | grep -v '^es/' | grep -v '^zh/' | grep -v '^ja/' \
            | grep -v '^pt/' | grep -v '^ru/' | grep -v '^it/' | grep -v '^pl/' \
            | grep -v '^fr/' | grep -v '^id/' | grep -v '^de/' | grep -v '^nl/' \
            | grep -v '^ar/' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found changed files: $CHANGED"

      - name: Translate changed files
        if: steps.changed.outputs.files != ''
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Translating: $file"
            python translate_site.py --file "$file" --force
          done <<< "${{ steps.changed.outputs.files }}"

      - name: Update sitemaps
        if: steps.changed.outputs.files != ''
        run: python translate_site.py --sitemaps

      - name: Commit translations
        if: steps.changed.outputs.files != ''
        run: |
          git config user.name "WolveStack Bot"
          git config user.email "bot@wolvestack.com"
          git add en/ es/ zh/ ja/ pt/ ru/ it/ pl/ fr/ id/ de/ nl/ ar/ sitemap.xml
          git diff --staged --quiet || git commit -m "Auto-translate: $(echo '${{ steps.changed.outputs.files }}' | wc -l | tr -d ' ') files to 12 languages"
          git push

  deploy:
    needs: translate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Get the latest including translations

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3.114.17 pages deploy . --project-name wolvestack --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
